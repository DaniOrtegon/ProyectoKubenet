# ============================================================
# backup.yaml — CronJobs de backup hacia MinIO
#
# ESTRATEGIA:
#   - 2:00 AM: dump de MariaDB → wordpress-backups/mariadb/
#   - 3:00 AM: sync de uploads WordPress → wordpress-backups/uploads/
#   - 4:00 AM (domingos): limpieza de backups >30 días
#
# RPO: ~24h  |  RTO: ~15 min
# ============================================================

# --- CronJob 1: Dump diario de MariaDB ---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: mariadb-backup
  namespace: databases
  labels:
    app: mariadb-backup
    app.kubernetes.io/part-of: wordpress-ha
    app.kubernetes.io/component: backup
spec:
  schedule: "0 2 * * *"          # Diario a las 2:00 AM
  concurrencyPolicy: Forbid       # No lanza un nuevo job si el anterior sigue corriendo
  failedJobsHistoryLimit: 3
  successfulJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: mariadb-backup
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: mariadb:10.6
              imagePullPolicy: Never
              command:
                - sh
                - -c
                - |
                  set -e
                  DATE=$(date +%Y%m%d_%H%M%S)
                  BACKUP_FILE="/tmp/wordpress_db_${DATE}.sql.gz"

                  echo "=== Iniciando backup MariaDB: ${DATE} ==="

                  # Dump de la base de datos wordpress_db
                  mysqldump \
                    -h mariadb.databases.svc.cluster.local \
                    -u root \
                    -p"${MYSQL_ROOT_PASSWORD}" \
                    --single-transaction \
                    --routines \
                    --triggers \
                    wordpress_db | gzip > "${BACKUP_FILE}"

                  echo "Dump completado: ${BACKUP_FILE}"

                  # Subir a MinIO usando mc
                  mc alias set minio http://minio.storage.svc.cluster.local:9000 \
                    "${MINIO_ACCESS_KEY}" "${MINIO_SECRET_KEY}"

                  mc cp "${BACKUP_FILE}" "minio/wordpress-backups/mariadb/${DATE}.sql.gz"
                  echo "=== Backup subido a MinIO: mariadb/${DATE}.sql.gz ==="

                  # Listar últimos 5 backups
                  mc ls minio/wordpress-backups/mariadb/ | tail -5
              env:
                - name: MYSQL_ROOT_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: mariadb-secret
                      key: mariadb-root-password
                - name: MINIO_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: minio-secret
                      key: root-user
                - name: MINIO_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: minio-secret
                      key: root-password
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 256Mi

---
# --- CronJob 2: Sync diario de uploads de WordPress ---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: wordpress-uploads-backup
  namespace: wordpress
  labels:
    app: wordpress-backup
    app.kubernetes.io/part-of: wordpress-ha
    app.kubernetes.io/component: backup
spec:
  schedule: "0 3 * * *"          # Diario a las 3:00 AM
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 3
  successfulJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: wordpress-backup
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: minio/mc:RELEASE.2024-01-16T16-07-38Z
              imagePullPolicy: Never
              command:
                - sh
                - -c
                - |
                  set -e
                  DATE=$(date +%Y%m%d_%H%M%S)
                  echo "=== Iniciando backup uploads WordPress: ${DATE} ==="

                  mc alias set minio http://minio.storage.svc.cluster.local:9000 \
                    "${MINIO_ACCESS_KEY}" "${MINIO_SECRET_KEY}"

                  # Sync de uploads de MinIO (wordpress-uploads → wordpress-backups/uploads/)
                  mc mirror \
                    --overwrite \
                    minio/wordpress-uploads \
                    "minio/wordpress-backups/uploads/${DATE}/"

                  echo "=== Backup de uploads completado: uploads/${DATE}/ ==="
              env:
                - name: MINIO_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: minio-secret
                      key: access-key
                - name: MINIO_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: minio-secret
                      key: secret-key
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
          volumes:
            - name: wordpress-storage
              persistentVolumeClaim:
                claimName: wordpress-pvc

---
# --- CronJob 3: Limpieza semanal de backups >30 días ---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: backup-cleanup
  namespace: storage
  labels:
    app: backup-cleanup
    app.kubernetes.io/part-of: wordpress-ha
    app.kubernetes.io/component: backup
spec:
  schedule: "0 4 * * 0"          # Domingos a las 4:00 AM
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 3
  successfulJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: backup-cleanup
        spec:
          restartPolicy: OnFailure
          containers:
            - name: cleanup
              image: minio/mc:RELEASE.2024-01-16T16-07-38Z
              imagePullPolicy: Never
              command:
                - sh
                - -c
                - |
                  set -e
                  echo "=== Iniciando limpieza de backups >30 días ==="

                  mc alias set minio http://minio.storage.svc.cluster.local:9000 \
                    "${MINIO_ACCESS_KEY}" "${MINIO_SECRET_KEY}"

                  # Eliminar dumps de MariaDB con más de 30 días
                  mc rm --recursive --force \
                    --older-than 720h \
                    minio/wordpress-backups/mariadb/ 2>/dev/null || true

                  # Eliminar backups de uploads con más de 30 días
                  mc rm --recursive --force \
                    --older-than 720h \
                    minio/wordpress-backups/uploads/ 2>/dev/null || true

                  echo "=== Limpieza completada ==="
                  mc du minio/wordpress-backups/
              env:
                - name: MINIO_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: minio-secret
                      key: root-user
                - name: MINIO_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: minio-secret
                      key: root-password
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
